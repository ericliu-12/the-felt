<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black background -->
  <rect width="32" height="32" fill="#000"/>
  <!-- Gold outer circle -->
  <circle cx="16" cy="16" r="14" fill="#c9a84c"/>
  <!-- Edge notches: 8 black slots cut into the outer ring -->
  <rect x="15" y="2" width="2" height="4" fill="#000"/>
  <rect x="15" y="2" width="2" height="4" fill="#000" transform="rotate(45 16 16)"/>
  <rect x="15" y="2" width="2" height="4" fill="#000" transform="rotate(90 16 16)"/>
  <rect x="15" y="2" width="2" height="4" fill="#000" transform="rotate(135 16 16)"/>
  <rect x="15" y="2" width="2" height="4" fill="#000" transform="rotate(180 16 16)"/>
  <rect x="15" y="2" width="2" height="4" fill="#000" transform="rotate(225 16 16)"/>
  <rect x="15" y="2" width="2" height="4" fill="#000" transform="rotate(270 16 16)"/>
  <rect x="15" y="2" width="2" height="4" fill="#000" transform="rotate(315 16 16)"/>
  <!-- Black gap band -->
  <circle cx="16" cy="16" r="10" fill="#000"/>
  <!-- Gold inner disk -->
  <circle cx="16" cy="16" r="8" fill="#c9a84c"/>
</svg>
